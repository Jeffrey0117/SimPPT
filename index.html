<script id="simppt-parser">
const SimpptParser = (() => {
  'use strict'

  const KV_RE = /^([A-Za-z_][\w-]*)\s*:\s*(.+)$/
  const SEP_RE = /^\s*---(?:[ \t]+(.*?))?[ \t]*$/
  const IMG_RE = /^!\[([^\]]*)\]\(([^)]+)\)(?:\s*\{([^}]*)\})?$/

  const parseDirectives = (raw) =>
    raw.split(/\s+/).filter(Boolean).reduce((acc, pair) => {
      const eq = pair.indexOf('=')
      return eq > 0 ? { ...acc, [pair.slice(0, eq)]: pair.slice(eq + 1) } : acc
    }, {})

  const parseFrontmatter = (lines) => {
    if (lines.length === 0 || lines[0].trim() !== '---') return { globals: {}, start: 0 }
    let close = -1
    for (let j = 1; j < lines.length; j += 1) {
      const t = lines[j].trim()
      if (t === '---') { close = j; break }
      if (t !== '' && !KV_RE.test(t)) break
    }
    if (close < 0) return { globals: {}, start: 0 }
    const globals = lines.slice(1, close).reduce((acc, line) => {
      const m = line.trim().match(KV_RE)
      return m ? { ...acc, [m[1]]: m[2].trim() } : acc
    }, {})
    return { globals, start: close + 1 }
  }

  const parse = (text, opts = {}) => {
    const lines = text.replace(/\r\n?/g, '\n').split('\n')
    const { globals, start } = parseFrontmatter(lines)
    const rawSlides = [{ meta: {}, sticky: false, lines: [] }]
    for (let j = start; j < lines.length; j += 1) {
      const m = lines[j].match(SEP_RE)
      if (m) {
        const raw = m[1] || ''
        rawSlides.push({
          meta: parseDirectives(raw),
          sticky: raw.split(/\s+/).includes('set'),
          lines: [],
        })
      } else {
        rawSlides[rawSlides.length - 1].lines.push(lines[j])
      }
    }
    let defaults = {}
    const slides = rawSlides
      .map((s) => {
        if (s.sticky) defaults = { ...defaults, ...s.meta }
        return {
          meta: { ...defaults, ...s.meta },
          ownMeta: s.meta,
          body: s.lines.join('\n').trim(),
        }
      })
      .filter((s) => opts.keepEmpty === true || s.body !== '' || Object.keys(s.ownMeta).length > 0)
      .map(({ meta, body }) => ({ meta, body }))
    return { globals, slides }
  }

  const slideIndexAt = (text, offset) => {
    const norm = text.replace(/\r\n?/g, '\n')
    const lines = norm.split('\n')
    const { start } = parseFrontmatter(lines)
    const cursorLine = norm.slice(0, offset).split('\n').length - 1
    let idx = 0
    for (let j = start; j <= cursorLine && j < lines.length; j += 1) {
      if (SEP_RE.test(lines[j])) idx += 1
    }
    return idx
  }

  const slideLineRange = (text, index) => {
    const lines = text.replace(/\r\n?/g, '\n').split('\n')
    const { start } = parseFrontmatter(lines)
    let k = 0
    let from = start
    for (let j = start; j < lines.length; j += 1) {
      if (SEP_RE.test(lines[j])) {
        if (k === index) return { start: from, end: j }
        k += 1
        from = j + 1
      }
    }
    return k === index ? { start: from, end: lines.length } : null
  }

  const escapeHtml = (s) => s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')

  const inline = (s) => s
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')

  const ATTR_TAIL_RE = /\s*\{([A-Za-z_][\w-]*=[^}]*)\}\s*$/

  const stripAttrTail = (line) => {
    const m = line.match(ATTR_TAIL_RE)
    return m
      ? { text: line.slice(0, m.index), attrs: parseDirectives(m[1]) }
      : { text: line, attrs: null }
  }

  const blocksOf = (body) => {
    const lines = body.replace(/\r\n?/g, '\n').split('\n')
    const blocks = []
    let cur = null
    let blankRun = 0
    const flush = () => {
      if (cur) blocks.push(cur)
      cur = null
    }
    for (let i = 0; i < lines.length; i += 1) {
      const raw = lines[i].trim()
      if (raw === '') {
        flush()
        blankRun += 1
        continue
      }
      if (blankRun > 1 && blocks.length > 0) {
        blocks.push({ type: 'gap', n: blankRun - 1, start: i - blankRun })
      }
      blankRun = 0
      const img = raw.match(IMG_RE)
      if (img) {
        flush()
        blocks.push({
          type: 'img', alt: img[1], src: img[2],
          attrs: img[3] ? parseDirectives(img[3]) : null, start: i,
        })
        continue
      }
      const h = raw.match(/^(#{1,3})\s+(.*)$/)
      if (h) {
        flush()
        const s = stripAttrTail(h[2])
        blocks.push({ type: 'h', level: h[1].length, text: s.text, attrs: s.attrs, start: i })
        continue
      }
      const ul = raw.match(/^[-*]\s+(.*)$/)
      if (ul) {
        if (cur && cur.type === 'ul') { cur.items.push(ul[1]); continue }
        flush()
        const s = stripAttrTail(ul[1])
        cur = { type: 'ul', items: [s.text], attrs: s.attrs, start: i }
        continue
      }
      const ol = raw.match(/^(\d+)\.\s+(.*)$/)
      if (ol) {
        if (cur && cur.type === 'ol') { cur.items.push(ol[2]); continue }
        flush()
        const s = stripAttrTail(ol[2])
        cur = { type: 'ol', items: [s.text], attrs: s.attrs, start: i, startNum: parseInt(ol[1], 10) }
        continue
      }
      if (cur && cur.type === 'p') { cur.lines.push(raw); continue }
      flush()
      const s = stripAttrTail(raw)
      cur = { type: 'p', lines: [s.text], attrs: s.attrs, start: i }
    }
    flush()
    return blocks
  }

  const textStyleAttr = (attrs) => {
    if (!attrs) return ''
    const x = parseFloat(attrs.x)
    const y = parseFloat(attrs.y)
    const abs = Number.isFinite(x) && Number.isFinite(y)
    const s = parseFloat(attrs.s)
    const styles = []
    if (abs) styles.push(`left:${x}%`, `top:${y}%`)
    if (Number.isFinite(s) && s !== 100) styles.push(`--ts:${parseFloat((s / 100).toFixed(3))}`)
    if (attrs.c && /^[#\w(),.%\s-]+$/.test(attrs.c)) styles.push(`color:${attrs.c}`)
    if (attrs.b === '1' || attrs.b === 'true') styles.push('font-weight:700')
    if (styles.length === 0) return ''
    return `${abs ? ' class="txt-abs"' : ''} style="${styles.join(';')}"`
  }

  const renderMarkdown = (body, resolveSrc = (src) => src) => blocksOf(body).map((b) => {
    if (b.type === 'gap') return `<div class="gap" style="height:${b.n * 2.5}vw"></div>`
    if (b.type === 'img') {
      const x = parseFloat(b.attrs && b.attrs.x)
      const y = parseFloat(b.attrs && b.attrs.y)
      const w = parseFloat(b.attrs && b.attrs.w)
      const tag = `<img src="${escapeHtml(resolveSrc(b.src))}" alt="${escapeHtml(b.alt)}">`
      if (Number.isFinite(x) && Number.isFinite(y)) {
        const width = Number.isFinite(w) ? w : 30
        return `<figure class="img-abs" style="left:${x}%;top:${y}%;width:${width}%">${tag}</figure>`
      }
      return `<figure>${tag}</figure>`
    }
    const abs = textStyleAttr(b.attrs)
    if (b.type === 'h') return `<h${b.level}${abs}>${inline(escapeHtml(b.text))}</h${b.level}>`
    if (b.type === 'ul' || b.type === 'ol') {
      const startAttr = b.type === 'ol' && b.startNum > 1 ? ` start="${b.startNum}"` : ''
      return `<${b.type}${abs}${startAttr}>${b.items.map((i) => `<li>${inline(escapeHtml(i))}</li>`).join('')}</${b.type}>`
    }
    return `<p${abs}>${inline(escapeHtml(b.lines.join(' ')))}</p>`
  }).join('')

  return { parse, renderMarkdown, slideIndexAt, slideLineRange, blocksOf, stripAttrTail, IMG_RE }
})()
</script>

<script>
(() => {
  'use strict'

  const landing = document.getElementById('landing')
  const stage = document.getElementById('stage')
  const stageOverlay = document.getElementById('stage-overlay')
  const content = document.getElementById('slide-content')
  const indicator = document.getElementById('indicator')
  const toast = document.getElementById('toast')
  const fileInput = document.getElementById('file-input')
  const openFileBtn = document.getElementById('open-file')
  const openDirBtn = document.getElementById('open-dir')
  const openSampleBtn = document.getElementById('open-sample')
  const sampleDeck = document.getElementById('sample-deck')
  const newDeckBtn = document.getElementById('new-deck')
  const edOverlay = document.getElementById('ed-overlay')
  const editor = document.getElementById('editor')
  const edText = document.getElementById('ed-text')
  const edPreviewBox = document.getElementById('ed-preview')
  const edViewport = document.getElementById('ed-viewport')
  const edFrame = document.getElementById('ed-frame')
  const edContent = document.getElementById('ed-content')
  const edPageInfo = document.getElementById('ed-pageinfo')
  const edStatus = document.getElementById('ed-status')
  const edPlayBtn = document.getElementById('ed-play')
  const edSaveBtn = document.getElementById('ed-save')

  const MD_RE = /\.(md|markdown)$/i
  const DEFAULT_BG = '#101014'
  const DEFAULT_COLOR = '#f5f5f5'

  const state = {
    deck: null,
    index: 0,
    mdPath: '',
    sourceText: '',
    deckBaseUrl: '',
    deckUrl: '',
    fileMap: new Map(),
    blobUrls: new Map(),
    fileHandle: null,
    dirHandle: null,
    lastModified: 0,
    pollTimer: null,
  }

  let toastTimer = null
  const showToast = (msg) => {
    toast.textContent = msg
    toast.hidden = false
    clearTimeout(toastTimer)
    toastTimer = setTimeout(() => { toast.hidden = true }, 3500)
  }

  const normalizePath = (base, src) => {
    const joined = `${base ? `${base}/` : ''}${src}`
    return joined.split('/').reduce((acc, part) => {
      if (part === '' || part === '.') return acc
      if (part === '..') return acc.slice(0, -1)
      return [...acc, part]
    }, []).join('/')
  }

  const findByBasename = (src) => {
    const base = src.split('/').pop()
    const key = [...state.fileMap.keys()].find((k) => k.split('/').pop() === base)
    return key ? { key, file: state.fileMap.get(key) } : null
  }

  const resolveSrc = (src) => {
    if (/^(https?:|data:|blob:)/i.test(src)) return src
    const mdDir = state.mdPath.includes('/')
      ? state.mdPath.slice(0, state.mdPath.lastIndexOf('/'))
      : ''
    const full = normalizePath(mdDir, src)
    const hit = state.fileMap.has(full)
      ? { key: full, file: state.fileMap.get(full) }
      : findByBasename(src)
    if (!hit) return state.deckBaseUrl ? state.deckBaseUrl + src : src
    if (!state.blobUrls.has(hit.key)) state.blobUrls.set(hit.key, URL.createObjectURL(hit.file))
    return state.blobUrls.get(hit.key)
  }

  const LAYOUTS = ['top', 'split']

  const applyWidth = (container, width) => {
    const w = parseFloat(width)
    if (Number.isFinite(w) && w > 0) container.style.setProperty('--cw', `${Math.min(w, 100)}vw`)
    else container.style.removeProperty('--cw')
  }

  const applyLayout = (container, layout) => {
    container.className = `deck-slide slide-scope${LAYOUTS.includes(layout) ? ` layout-${layout}` : ''}`
    if (layout !== 'split') return
    const fig = container.querySelector('figure')
    if (!fig) return
    const children = [...container.children]
    const heading = children.find((el) => /^H[1-3]$/.test(el.tagName))
    const row = document.createElement('div')
    row.className = 'split-row'
    const wrap = document.createElement('div')
    wrap.className = 'split-text'
    for (const el of children) {
      if (el !== fig && el !== heading) wrap.appendChild(el)
    }
    row.appendChild(fig)
    row.appendChild(wrap)
    container.appendChild(row)
  }

  const renderSlide = () => {
    const slide = state.deck.slides[state.index]
    const meta = { ...state.deck.globals, ...slide.meta }
    stage.style.background = meta.bg || DEFAULT_BG
    stage.style.color = meta.color || DEFAULT_COLOR
    stage.style.setProperty('--accent', meta.accent || 'inherit')
    content.innerHTML = SimpptParser.renderMarkdown(slide.body, resolveSrc)
    stageOverlay.innerHTML = ''
    for (const el of [...content.querySelectorAll('.img-abs, .txt-abs')]) stageOverlay.appendChild(el)
    applyLayout(content, meta.layout)
    applyWidth(content, meta.width)
    indicator.textContent = `${state.index + 1} / ${state.deck.slides.length}`
  }

  const revokeBlobs = () => {
    for (const url of state.blobUrls.values()) URL.revokeObjectURL(url)
    state.blobUrls = new Map()
  }

  const loadDeck = (text, mdPath, fileMap, baseUrl = '') => {
    const deck = SimpptParser.parse(text)
    if (deck.slides.length === 0) {
      showToast('這份 .md 解析不出任何頁面')
      return false
    }
    revokeBlobs()
    state.deck = deck
    state.sourceText = text
    state.mdPath = mdPath
    state.fileMap = fileMap
    state.deckBaseUrl = baseUrl
    editor.hidden = true
    state.index = Math.min(state.index, deck.slides.length - 1)
    landing.hidden = true
    stage.hidden = false
    document.title = `simppt — ${mdPath.split('/').pop()}`
    renderSlide()
    scheduleSave()
    return true
  }

  const stopTimer = () => {
    clearInterval(state.pollTimer)
    state.pollTimer = null
  }

  const stopPolling = () => {
    stopTimer()
    state.fileHandle = null
    state.dirHandle = null
    state.deckUrl = ''
  }

  const goTo = (index) => {
    if (!state.deck) return
    const clamped = Math.max(0, Math.min(index, state.deck.slides.length - 1))
    if (clamped === state.index) return
    state.index = clamped
    renderSlide()
    if (state.deckUrl && !stage.hidden) {
      try {
        sessionStorage.setItem(`simppt-idx:${state.deckUrl}`, String(clamped))
      } catch {
        // sessionStorage 被擋就算了
      }
    }
    scheduleSave()
  }

  const pickMdPath = (fileMap) =>
    [...fileMap.keys()].filter((k) => MD_RE.test(k)).sort()[0]

  const openFromFileMap = async (fileMap) => {
    const mdPath = pickMdPath(fileMap)
    if (!mdPath) {
      showToast('找不到 .md 檔')
      return
    }
    const text = await fileMap.get(mdPath).text()
    state.index = 0
    loadDeck(text, mdPath, fileMap)
  }

  // --- 拖曳載入（webkitGetAsEntry：檔案與資料夾通吃） ---

  const walkEntry = (entry, fileMap) => new Promise((resolve) => {
    if (entry.isFile) {
      entry.file((file) => {
        fileMap.set(entry.fullPath.replace(/^\//, ''), file)
        resolve()
      }, () => resolve())
      return
    }
    const reader = entry.createReader()
    const readBatch = () => {
      reader.readEntries(async (entries) => {
        if (entries.length === 0) { resolve(); return }
        await Promise.all(entries.map((e) => walkEntry(e, fileMap)))
        readBatch()
      }, () => resolve())
    }
    readBatch()
  })

  document.addEventListener('dragover', (e) => {
    e.preventDefault()
    document.body.classList.add('dragover')
  })
  document.addEventListener('dragleave', (e) => {
    if (e.relatedTarget === null) document.body.classList.remove('dragover')
  })
  document.addEventListener('drop', async (e) => {
    e.preventDefault()
    document.body.classList.remove('dragover')
    const entries = [...e.dataTransfer.items]
      .map((item) => item.webkitGetAsEntry && item.webkitGetAsEntry())
      .filter(Boolean)
    if (entries.length === 0) return
    const fileMap = new Map()
    await Promise.all(entries.map((entry) => walkEntry(entry, fileMap)))
    stopPolling()
    await openFromFileMap(fileMap)
  })

  // --- File System Access API（可 polling 自動重載） ---

  const walkDirHandle = async (dirHandle, prefix, fileMap) => {
    for await (const entry of dirHandle.values()) {
      if (entry.kind === 'file') fileMap.set(`${prefix}${entry.name}`, await entry.getFile())
      else await walkDirHandle(entry, `${prefix}${entry.name}/`, fileMap)
    }
  }

  const reloadFromHandles = async () => {
    try {
      if (state.dirHandle) {
        const fileMap = new Map()
        await walkDirHandle(state.dirHandle, '', fileMap)
        const mdPath = pickMdPath(fileMap)
        if (!mdPath) return
        const file = fileMap.get(mdPath)
        if (file.lastModified === state.lastModified) return
        state.lastModified = file.lastModified
        const text = await file.text()
        if (text === state.sourceText || edDirty) return
        appendHistory(state.sourceText, state.mdPath)
        loadDeck(text, mdPath, fileMap)
      } else if (state.fileHandle) {
        const file = await state.fileHandle.getFile()
        if (file.lastModified === state.lastModified) return
        state.lastModified = file.lastModified
        const text = await file.text()
        if (text === state.sourceText || edDirty) return
        appendHistory(state.sourceText, state.mdPath)
        loadDeck(text, file.name, new Map())
      }
    } catch {
      // 檔案暫時不可讀（存檔瞬間）— 下一輪 polling 再試
    }
  }

  const startHandleWatch = () => {
    clearInterval(state.pollTimer)
    state.pollTimer = setInterval(reloadFromHandles, 1000)
  }

  openSampleBtn.addEventListener('click', () => {
    stopPolling()
    state.index = 0
    loadDeck(sampleDeck.textContent.trim(), 'sample.md', new Map())
  })

  openFileBtn.addEventListener('click', async () => {
    if (!window.showOpenFilePicker) {
      fileInput.click()
      return
    }
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md', '.markdown'] } }],
      })
      const file = await handle.getFile()
      stopPolling()
      revokeBlobs()
      state.fileHandle = handle
      state.mdPath = file.name
      state.fileMap = new Map()
      state.sourceText = await file.text()
      state.lastModified = file.lastModified
      state.index = 0
      enterEditor(state.sourceText)
    } catch {
      // 使用者取消
    }
  })

  openDirBtn.addEventListener('click', async () => {
    if (!window.showDirectoryPicker) {
      showToast('此瀏覽器不支援開啟資料夾，請改用拖曳')
      return
    }
    try {
      const handle = await window.showDirectoryPicker()
      const fileMap = new Map()
      await walkDirHandle(handle, '', fileMap)
      const mdPath = pickMdPath(fileMap)
      if (!mdPath) {
        showToast('資料夾裡找不到 .md 檔')
        return
      }
      const file = fileMap.get(mdPath)
      stopPolling()
      revokeBlobs()
      state.dirHandle = handle
      state.mdPath = mdPath
      state.fileMap = fileMap
      state.sourceText = await file.text()
      state.lastModified = file.lastModified
      state.index = 0
      enterEditor(state.sourceText)
    } catch {
      // 使用者取消
    }
  })

  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0]
    if (!file) return
    stopPolling()
    revokeBlobs()
    state.mdPath = file.name
    state.fileMap = new Map()
    state.sourceText = await file.text()
    state.index = 0
    enterEditor(state.sourceText)
    fileInput.value = ''
  })

  // --- 編輯模式：左寫右預覽 ---

  const NEW_DECK_TEMPLATE = [
    '---', 'bg: #0d0d0f', 'color: #f5f5f5', 'accent: #f4b860', '---', '',
    '# 開場大標題', '',
    '前幾張黑底白字，重點用 **粗體** 標色。', '',
    '---', '',
    '# 繼續黑底', '',
    '沒設定就繼承前面。', '',
    '--- set bg=#ffffff color=#1c1c1e accent=#d84a3f', '',
    '# 從這張起白底黑字', '',
    '分隔線寫 set = 之後都這樣。', '',
    '--- layout=top', '',
    '# 內容頁標題在上', '',
    '內文在下，**粗體關鍵字**標色。', '',
  ].join('\n')

  let edDirty = false

  const setStatus = (msg, ok = false) => {
    edStatus.textContent = msg
    edStatus.style.color = ok ? '#7dcf8a' : ''
  }

  const fitPreview = () => {
    const w = edPreviewBox.clientWidth - 32
    const h = edPreviewBox.clientHeight - 64
    const scale = Math.max(0.05, Math.min(w / window.innerWidth, h / (window.innerWidth * 0.5625)))
    edViewport.style.width = `${window.innerWidth * scale}px`
    edViewport.style.height = `${window.innerWidth * 0.5625 * scale}px`
    edFrame.style.transform = `scale(${scale})`
  }

  let previewBlocks = []
  let previewIdx = 0

  const attachHandle = (fig) => {
    const handle = document.createElement('span')
    handle.className = 'img-handle'
    fig.appendChild(handle)
  }

  const updatePreview = () => {
    const text = edText.value
    const deck = SimpptParser.parse(text, { keepEmpty: true })
    const idx = Math.min(
      SimpptParser.slideIndexAt(text, edText.selectionStart),
      Math.max(0, deck.slides.length - 1),
    )
    previewIdx = idx
    const slide = deck.slides[idx] || { meta: {}, body: '' }
    const meta = { ...deck.globals, ...slide.meta }
    edFrame.style.background = meta.bg || DEFAULT_BG
    edFrame.style.color = meta.color || DEFAULT_COLOR
    edFrame.style.setProperty('--accent', meta.accent || 'inherit')
    edContent.innerHTML = SimpptParser.renderMarkdown(slide.body, resolveSrc)
    previewBlocks = [...edContent.children]
    edOverlay.innerHTML = ''
    for (const el of previewBlocks.filter((b) => b.classList.contains('img-abs') || b.classList.contains('txt-abs'))) {
      edOverlay.appendChild(el)
      attachHandle(el)
    }
    applyLayout(edContent, meta.layout)
    applyWidth(edContent, meta.width)
    edPageInfo.textContent = deck.slides.length > 0 ? `第 ${idx + 1} / ${deck.slides.length} 頁` : ''
    selectedKs = new Set([...selectedKs].filter((k) => previewBlocks[k]))
    applySelectionClasses()
  }

  const enterEditor = (text) => {
    stopTimer()
    landing.hidden = true
    stage.hidden = true
    editor.hidden = false
    edText.value = text
    edDirty = false
    setStatus('Ctrl+S 儲存 · Ctrl+Enter 播放 · 播放中按 E 回編輯')
    fitPreview()
    updatePreview()
    edText.focus()
    scheduleSave()
  }

  const playFromEditor = () => {
    const text = edText.value
    const deck = SimpptParser.parse(text)
    if (deck.slides.length === 0) {
      showToast('目前內容解析不出任何頁面')
      return
    }
    state.index = Math.min(
      SimpptParser.slideIndexAt(text, edText.selectionStart),
      deck.slides.length - 1,
    )
    loadDeck(text, state.mdPath || '未命名.md', state.fileMap)
    if (state.fileHandle || state.dirHandle) startHandleWatch()
  }

  const writeTo = async (handle, text) => {
    const writable = await handle.createWritable()
    await writable.write(text)
    await writable.close()
  }

  const ensureRW = async (handle) => {
    if (await handle.queryPermission({ mode: 'readwrite' }) === 'granted') return true
    return await handle.requestPermission({ mode: 'readwrite' }) === 'granted'
  }

  const handleForPath = async (dirHandle, path) => {
    const parts = path.split('/')
    const dir = await parts.slice(0, -1).reduce(
      async (acc, name) => (await acc).getDirectoryHandle(name),
      Promise.resolve(dirHandle),
    )
    return dir.getFileHandle(parts[parts.length - 1], { create: true })
  }

  const downloadMd = (text) => {
    const a = document.createElement('a')
    const url = URL.createObjectURL(new Blob([text], { type: 'text/markdown' }))
    a.href = url
    a.download = (state.mdPath || '簡報.md').split('/').pop()
    a.click()
    setTimeout(() => URL.revokeObjectURL(url), 5000)
  }

  const serverAutoSave = async (text) => {
    const base = (state.mdPath || '').split('/').pop()
    const stamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')
    const rel = /^decks\//.test(state.mdPath)
      ? state.mdPath
      : `decks/${base && /\.(md|markdown)$/i.test(base) ? base : `未命名-${stamp}.md`}`
    try {
      const res = await fetch('/__save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: rel, text }),
      })
      if (!res.ok) return false
      state.mdPath = rel
      state.deckUrl = rel
      document.title = `simppt — ${rel.split('/').pop()}`
      return true
    } catch {
      return false
    }
  }

  const saveDeck = async () => {
    const text = edText.value
    try {
      if (state.deckUrl) {
        const res = await fetch('/__save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: state.deckUrl, text }),
        })
        if (!res.ok) throw new Error(`server save ${res.status}`)
      } else if (state.fileHandle && await ensureRW(state.fileHandle)) {
        await writeTo(state.fileHandle, text)
        state.lastModified = (await state.fileHandle.getFile()).lastModified
      } else if (state.dirHandle && state.mdPath && await ensureRW(state.dirHandle)) {
        const handle = await handleForPath(state.dirHandle, state.mdPath)
        await writeTo(handle, text)
        state.lastModified = (await handle.getFile()).lastModified
      } else if (/^https?:$/.test(location.protocol) && await serverAutoSave(text)) {
        // 已直接存進 server 的 decks/
      } else if (window.showSaveFilePicker) {
        const handle = await window.showSaveFilePicker({
          suggestedName: (state.mdPath || '簡報.md').split('/').pop(),
          types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md'] } }],
        })
        state.fileHandle = handle
        state.mdPath = handle.name
        await writeTo(handle, text)
      } else {
        downloadMd(text)
      }
      state.sourceText = text
      edDirty = false
      appendHistory(text, state.mdPath)
      setStatus(`已儲存 ✓ ${state.deckUrl || state.mdPath || '簡報.md'} ${new Date().toLocaleTimeString()}`, true)
      scheduleSave()
    } catch (err) {
      if (err && err.name === 'AbortError') return
      showToast('儲存失敗，改用下載')
      downloadMd(text)
    }
  }

  // --- 預覽區直接編排：拖=移動、右下把手=縮放、雙擊=還原該塊、還原版面=清整頁 ---

  const currentSlideLines = () => {
    const range = SimpptParser.slideLineRange(edText.value, previewIdx)
    if (!range) return null
    const lines = edText.value.split('\n')
    let lead = range.start
    while (lead < range.end && lines[lead].trim() === '') lead += 1
    return { lines, range, lead }
  }

  const setEditorText = (lines) => {
    const oldText = edText.value
    const newText = lines.join('\n')
    const selStart = edText.selectionStart
    const selEnd = edText.selectionEnd
    const scroll = edText.scrollTop
    let prefix = 0
    const minLen = Math.min(oldText.length, newText.length)
    while (prefix < minLen && oldText[prefix] === newText[prefix]) prefix += 1
    const delta = newText.length - oldText.length
    const adjust = (pos) => (pos <= prefix ? pos : Math.max(prefix, pos + delta))
    edText.value = newText
    edText.setSelectionRange(adjust(selStart), adjust(selEnd))
    edText.scrollTop = scroll
    edDirty = true
    setStatus('未儲存變更')
    updatePreview()
    scheduleSave()
  }

  const ATTR_ORDER = ['x', 'y', 'w', 's', 'c', 'b']

  const serializeAttrs = (attrs) => {
    if (!attrs) return ''
    const parts = ATTR_ORDER
      .filter((key) => attrs[key] !== undefined && attrs[key] !== null && `${attrs[key]}` !== '')
      .map((key) => `${key}=${attrs[key]}`)
    return parts.length > 0 ? `{${parts.join(' ')}}` : ''
  }

  const rewriteBlockLine = (line, attrs) => {
    const trimmed = line.trim()
    const img = trimmed.match(SimpptParser.IMG_RE)
    const ser = serializeAttrs(attrs)
    if (img) return `![${img[1]}](${img[2]})${ser}`
    const base = SimpptParser.stripAttrTail(line).text.trimEnd()
    return ser ? `${base} ${ser}` : base
  }

  const currentBlock = (k) => {
    const ctx = currentSlideLines()
    if (!ctx) return null
    const body = ctx.lines.slice(ctx.range.start, ctx.range.end).join('\n').trim()
    const block = SimpptParser.blocksOf(body)[k]
    return block ? { ctx, block } : null
  }

  const writeBlockAttrs = (k, updates) => {
    const found = currentBlock(k)
    if (!found) return
    const { ctx, block } = found
    const merged = updates === null ? null : { ...(block.attrs || {}), ...updates }
    const li = ctx.lead + block.start
    const next = rewriteBlockLine(ctx.lines[li], merged)
    if (ctx.lines[li] === next) return
    setEditorText([...ctx.lines.slice(0, li), next, ...ctx.lines.slice(li + 1)])
  }

  const distributeVertically = () => {
    const ctx = currentSlideLines()
    if (!ctx) return
    const body = ctx.lines.slice(ctx.range.start, ctx.range.end).join('\n').trim()
    const blocks = SimpptParser.blocksOf(body)
    const frameRect = edFrame.getBoundingClientRect()
    const items = previewBlocks
      .map((el, k) => ({ el, k }))
      .filter(({ el, k }) => selectedKs.has(k)
        && (el.classList.contains('txt-abs') || el.classList.contains('img-abs')))
      .map(({ el, k }) => ({
        k,
        top: parseFloat(el.style.top) || 0,
        h: (el.getBoundingClientRect().height / frameRect.height) * 100,
      }))
      .sort((a, b) => a.top - b.top)
    if (items.length < 3) {
      showToast('按住 Shift 點選至少三個拖曳過的區塊，再按等距')
      return
    }
    const first = items[0]
    const last = items[items.length - 1]
    const span = (last.top + last.h) - first.top
    const sumH = items.reduce((acc, it) => acc + it.h, 0)
    const gap = (span - sumH) / (items.length - 1)
    const lines = [...ctx.lines]
    let cursor = first.top
    for (const it of items) {
      const block = blocks[it.k]
      if (block) {
        const li = ctx.lead + block.start
        lines[li] = rewriteBlockLine(lines[li], { ...(block.attrs || {}), y: cursor.toFixed(1) })
      }
      cursor += it.h + gap
    }
    setEditorText(lines)
  }

  const resetSlideLayout = () => {
    const ctx = currentSlideLines()
    if (!ctx) return
    let changed = false
    const nextLines = ctx.lines.map((line, j) => {
      if (j < ctx.range.start || j >= ctx.range.end || line.trim() === '') return line
      const next = rewriteBlockLine(line, null)
      if (next !== line) changed = true
      return next
    })
    if (changed) setEditorText(nextLines)
  }

  const guideV = document.getElementById('guide-v')
  const guideH = document.getElementById('guide-h')
  const edTools = document.getElementById('ed-tools')
  let dragCtx = null
  let selectedKs = new Set()

  const applySelectionClasses = () => {
    for (const el of document.querySelectorAll('.block-selected')) el.classList.remove('block-selected')
    for (const k of selectedKs) {
      if (previewBlocks[k]) previewBlocks[k].classList.add('block-selected')
    }
    edTools.hidden = selectedKs.size === 0
  }

  const deselectBlock = () => {
    selectedKs = new Set()
    applySelectionClasses()
  }

  const selectBlock = (el, k, additive) => {
    if (!additive) {
      selectedKs = new Set([k])
    } else if (selectedKs.has(k)) {
      selectedKs = new Set([...selectedKs].filter((s) => s !== k))
    } else {
      selectedKs = new Set([...selectedKs, k])
    }
    applySelectionClasses()
  }

  const hideGuides = () => {
    guideV.hidden = true
    guideH.hidden = true
  }

  const convertToAbs = (el, isImg, frameRect) => {
    const rect = (isImg ? el.querySelector('img') : el).getBoundingClientRect()
    el.classList.add(isImg ? 'img-abs' : 'txt-abs')
    el.style.left = `${(((rect.left - frameRect.left) / frameRect.width) * 100).toFixed(1)}%`
    el.style.top = `${(((rect.top - frameRect.top) / frameRect.height) * 100).toFixed(1)}%`
    if (isImg) el.style.width = `${((rect.width / frameRect.width) * 100).toFixed(1)}%`
    edOverlay.appendChild(el)
    attachHandle(el)
  }

  const BLOCK_SELECTOR = 'figure, h1, h2, h3, p, ul, ol'
  const SNAP = 1.4

  edFrame.addEventListener('mousedown', (e) => {
    const el = e.target.closest(BLOCK_SELECTOR)
    if (!el) return
    const k = previewBlocks.indexOf(el)
    if (k < 0) return
    e.preventDefault()
    dragCtx = {
      el, k,
      additive: e.shiftKey || e.ctrlKey,
      mode: e.target.closest('.img-handle') ? 'resize' : 'move',
      frameRect: edFrame.getBoundingClientRect(),
      isImg: el.tagName === 'FIGURE',
      isAbs: el.classList.contains('img-abs') || el.classList.contains('txt-abs'),
      moved: false,
      startX: e.clientX,
      startY: e.clientY,
      x: parseFloat(el.style.left) || 0,
      y: parseFloat(el.style.top) || 0,
      w: parseFloat(el.style.width) || 0,
      s: (parseFloat(el.style.getPropertyValue('--ts')) || 1) * 100,
    }
  })

  edFrame.addEventListener('dblclick', (e) => {
    const el = e.target.closest(BLOCK_SELECTOR)
    if (!el) return
    const k = previewBlocks.indexOf(el)
    if (k >= 0) writeBlockAttrs(k, null)
  })

  edPreviewBox.addEventListener('mousedown', (e) => {
    if (!e.target.closest(BLOCK_SELECTOR) && !e.target.closest('#ed-tools')) deselectBlock()
  })

  window.addEventListener('mousemove', (e) => {
    if (!dragCtx) return
    if (!dragCtx.moved) {
      if (Math.hypot(e.clientX - dragCtx.startX, e.clientY - dragCtx.startY) < 4) return
      dragCtx.moved = true
      if (!dragCtx.isAbs) {
        convertToAbs(dragCtx.el, dragCtx.isImg, dragCtx.frameRect)
        dragCtx.isAbs = true
        dragCtx.x = parseFloat(dragCtx.el.style.left) || 0
        dragCtx.y = parseFloat(dragCtx.el.style.top) || 0
        dragCtx.w = parseFloat(dragCtx.el.style.width) || 0
      }
    }
    const { el, frameRect } = dragCtx
    const dx = ((e.clientX - dragCtx.startX) / frameRect.width) * 100
    const dy = ((e.clientY - dragCtx.startY) / frameRect.height) * 100
    if (dragCtx.mode === 'resize') {
      if (dragCtx.isImg) {
        el.style.width = `${Math.max(3, dragCtx.w + dx).toFixed(1)}%`
      } else {
        const s = Math.min(400, Math.max(20, dragCtx.s + dx * 2))
        el.style.setProperty('--ts', (s / 100).toFixed(3))
      }
      return
    }
    const rect = el.getBoundingClientRect()
    const bw = (rect.width / frameRect.width) * 100
    const bh = (rect.height / frameRect.height) * 100
    const proposed = { x: dragCtx.x + dx, y: dragCtx.y + dy }
    let snapX = null
    let snapY = null
    if (Math.abs(proposed.x + bw / 2 - 50) < SNAP) {
      snapX = 50 - bw / 2
      guideV.style.left = '50%'
    }
    if (Math.abs(proposed.y + bh / 2 - 50) < SNAP) {
      snapY = 50 - bh / 2
      guideH.style.top = '50%'
    }
    for (const other of edOverlay.children) {
      if (other === el || other.classList.contains('img-handle')) continue
      const ox = parseFloat(other.style.left)
      const oy = parseFloat(other.style.top)
      if (!Number.isFinite(ox) || !Number.isFinite(oy)) continue
      const or = other.getBoundingClientRect()
      const ocx = ox + ((or.width / frameRect.width) * 100) / 2
      if (snapX === null && Math.abs(proposed.x - ox) < SNAP) {
        snapX = ox
        guideV.style.left = `${ox}%`
      }
      if (snapX === null && Math.abs(proposed.x + bw / 2 - ocx) < SNAP) {
        snapX = ocx - bw / 2
        guideV.style.left = `${ocx}%`
      }
      if (snapY === null && Math.abs(proposed.y - oy) < SNAP) {
        snapY = oy
        guideH.style.top = `${oy}%`
      }
    }
    guideV.hidden = snapX === null
    guideH.hidden = snapY === null
    el.style.left = `${(snapX !== null ? snapX : proposed.x).toFixed(1)}%`
    el.style.top = `${(snapY !== null ? snapY : proposed.y).toFixed(1)}%`
  })

  window.addEventListener('mouseup', () => {
    if (!dragCtx) return
    const { el, k, isImg, moved, mode, additive } = dragCtx
    dragCtx = null
    hideGuides()
    if (!moved) {
      selectBlock(el, k, additive)
      return
    }
    if (mode === 'resize') {
      if (isImg) writeBlockAttrs(k, { w: parseFloat(el.style.width).toFixed(1) })
      else writeBlockAttrs(k, { s: String(Math.round((parseFloat(el.style.getPropertyValue('--ts')) || 1) * 100)) })
      return
    }
    const pos = {
      x: parseFloat(el.style.left).toFixed(1),
      y: parseFloat(el.style.top).toFixed(1),
    }
    if (isImg) writeBlockAttrs(k, { ...pos, w: parseFloat(el.style.width).toFixed(1) })
    else writeBlockAttrs(k, pos)
  })

  // --- 選取後的迷你工具列（可 Shift 多選） ---

  const isImgBlock = (k) => previewBlocks[k] && previewBlocks[k].tagName === 'FIGURE'
  const selectedTexts = () => [...selectedKs].sort((a, b) => a - b).filter((k) => !isImgBlock(k))
  const allSelected = () => [...selectedKs].sort((a, b) => a - b)

  const adjustSize = (delta) => {
    for (const k of allSelected()) {
      const found = currentBlock(k)
      if (!found) continue
      const attrs = found.block.attrs || {}
      if (isImgBlock(k)) {
        const w = parseFloat(attrs.w) || 30
        writeBlockAttrs(k, { w: String(Math.min(100, Math.max(5, Math.round(w + delta / 2)))) })
      } else {
        const s = parseFloat(attrs.s) || 100
        writeBlockAttrs(k, { s: String(Math.min(400, Math.max(30, Math.round(s + delta)))) })
      }
    }
  }

  const toggleBold = () => {
    const targets = selectedTexts()
    if (targets.length === 0) return
    const allBold = targets.every((k) => {
      const found = currentBlock(k)
      return found && (found.block.attrs || {}).b === '1'
    })
    for (const k of targets) writeBlockAttrs(k, { b: allBold ? '' : '1' })
  }

  const applyColor = (c) => {
    for (const k of selectedTexts()) writeBlockAttrs(k, { c })
  }

  edTools.addEventListener('click', (e) => {
    const swatch = e.target.closest('.swatch')
    if (swatch) {
      applyColor(swatch.dataset.c)
      return
    }
    const btn = e.target.closest('button')
    if (!btn) return
    if (btn.dataset.act === 'bigger') adjustSize(10)
    else if (btn.dataset.act === 'smaller') adjustSize(-10)
    else if (btn.dataset.act === 'bold') toggleBold()
    else if (btn.dataset.act === 'dist') distributeVertically()
    else if (btn.dataset.act === 'clear') {
      for (const k of allSelected()) writeBlockAttrs(k, null)
    }
  })

  document.getElementById('tool-color').addEventListener('input', (e) => {
    applyColor(e.target.value)
  })

  newDeckBtn.addEventListener('click', () => {
    stopPolling()
    state.mdPath = ''
    state.fileMap = new Map()
    state.sourceText = ''
    enterEditor(NEW_DECK_TEMPLATE)
  })

  let historyCursor = -1
  document.getElementById('open-history').addEventListener('click', () => {
    let hist = []
    try {
      hist = JSON.parse(localStorage.getItem('simppt-history') || '[]')
    } catch {
      hist = []
    }
    if (hist.length === 0) {
      showToast('還沒有歷史備份（編輯時會自動累積）')
      return
    }
    historyCursor = (historyCursor + 1) % hist.length
    const snap = hist[hist.length - 1 - historyCursor]
    stopPolling()
    state.mdPath = snap.mdPath || ''
    state.fileMap = new Map()
    enterEditor(snap.text)
    edDirty = true
    setStatus(`歷史備份 ${historyCursor + 1}/${hist.length} — ${new Date(snap.t).toLocaleString()}（回首頁再按可看更舊的）`)
  })
  edPlayBtn.addEventListener('click', playFromEditor)
  edSaveBtn.addEventListener('click', saveDeck)
  document.getElementById('ed-reset').addEventListener('click', resetSlideLayout)

  document.getElementById('ed-home').addEventListener('click', () => {
    if (edDirty && !window.confirm('有未儲存的變更，確定回首頁？')) return
    stopPolling()
    clearSession()
    editor.hidden = true
    stage.hidden = true
    landing.hidden = false
    document.title = 'simppt'
  })

  edText.addEventListener('input', () => {
    edDirty = true
    setStatus('未儲存變更')
    updatePreview()
    scheduleSave()
  })

  // --- 貼上圖片 → 上傳 urusai.cc → 插入 ![](url) ---

  const uploadImage = async (file) => {
    if (/^https?:$/.test(location.protocol)) {
      const res = await fetch('/__upload', {
        method: 'POST',
        headers: {
          'Content-Type': file.type || 'application/octet-stream',
          'X-Filename': encodeURIComponent(file.name || 'paste.png'),
        },
        body: file,
      })
      if (!res.ok) throw new Error(`upload ${res.status}`)
      return res.json()
    }
    const form = new FormData()
    form.append('file', file, file.name || 'paste.png')
    form.append('r18', '0')
    const res = await fetch('https://api.urusai.cc/v1/upload', { method: 'POST', body: form })
    if (!res.ok) throw new Error(`upload ${res.status}`)
    return res.json()
  }

  edText.addEventListener('paste', async (e) => {
    const items = (e.clipboardData && e.clipboardData.items) || []
    const imageItem = [...items].find((item) => item.type.startsWith('image/'))
    if (!imageItem) return
    e.preventDefault()
    const file = imageItem.getAsFile()
    if (!file) return
    const placeholder = `![上傳中…${Date.now() % 100000}]()`
    edText.setRangeText(`\n${placeholder}\n`, edText.selectionStart, edText.selectionEnd, 'end')
    edDirty = true
    setStatus('圖片上傳中…')
    updatePreview()
    try {
      const json = await uploadImage(file)
      const url = json && json.data && json.data.url_direct
      if (!url) throw new Error((json && json.message) || 'no url')
      edText.value = edText.value.replace(placeholder, `![](${url})`)
      setStatus('圖片已上傳 ✓', true)
    } catch (err) {
      edText.value = edText.value.replace(`\n${placeholder}\n`, '')
      showToast('圖片上傳失敗，再試一次或檢查網路')
      setStatus('未儲存變更')
    }
    edDirty = true
    updatePreview()
    scheduleSave()
  })
  edText.addEventListener('keyup', updatePreview)
  edText.addEventListener('click', updatePreview)

  window.addEventListener('resize', () => {
    if (!editor.hidden) fitPreview()
    if (!editor.hidden) updatePreview()
  })

  window.addEventListener('beforeunload', () => saveSession())

  document.addEventListener('keydown', (e) => {
    if (editor.hidden || !(e.ctrlKey || e.metaKey)) return
    if (e.code === 'KeyS' || e.key === 's' || e.key === 'S') {
      e.preventDefault()
      saveDeck()
    } else if (e.code === 'Enter' || e.key === 'Enter') {
      e.preventDefault()
      playFromEditor()
    }
  }, { capture: true })

  // --- 導覽 ---

  const toggleFullscreen = () => {
    if (document.fullscreenElement) document.exitFullscreen()
    else document.documentElement.requestFullscreen()
  }

  const exitPlay = () => {
    enterEditor(state.sourceText)
  }

  document.addEventListener('keydown', (e) => {
    if (!editor.hidden || !state.deck || stage.hidden) return
    const key = e.key
    if (key === 'e' || key === 'E') {
      enterEditor(state.sourceText)
      return
    }
    if (key === 'Escape') {
      if (!document.fullscreenElement) exitPlay()
      return
    }
    if (key === 'ArrowRight' || key === 'ArrowDown' || key === ' ' || key === 'PageDown') {
      e.preventDefault()
      goTo(state.index + 1)
    } else if (key === 'ArrowLeft' || key === 'ArrowUp' || key === 'PageUp') {
      e.preventDefault()
      goTo(state.index - 1)
    } else if (key === 'Home') {
      goTo(0)
    } else if (key === 'End') {
      goTo(state.deck.slides.length - 1)
    } else if (key === 'f' || key === 'F') {
      toggleFullscreen()
    } else if (key === 'p' || key === 'P') {
      indicator.hidden = !indicator.hidden
    }
  })

  stage.addEventListener('click', (e) => {
    if (e.target.closest('a')) return
    if (e.target.closest('#exit-play')) return
    if (e.clientX < window.innerWidth / 4) goTo(state.index - 1)
    else goTo(state.index + 1)
  })

  document.getElementById('exit-play').addEventListener('click', exitPlay)

  // --- 會話保存：重整後留在原地 ---

  const idbOpen = () => new Promise((resolve, reject) => {
    const req = indexedDB.open('simppt', 1)
    req.onupgradeneeded = () => req.result.createObjectStore('kv')
    req.onsuccess = () => resolve(req.result)
    req.onerror = () => reject(req.error)
  })

  const idbSet = async (key, val) => {
    const db = await idbOpen()
    return new Promise((resolve, reject) => {
      const tx = db.transaction('kv', 'readwrite')
      tx.objectStore('kv').put(val, key)
      tx.oncomplete = resolve
      tx.onerror = () => reject(tx.error)
    })
  }

  const idbGet = async (key) => {
    const db = await idbOpen()
    return new Promise((resolve, reject) => {
      const req = db.transaction('kv', 'readonly').objectStore('kv').get(key)
      req.onsuccess = () => resolve(req.result)
      req.onerror = () => reject(req.error)
    })
  }

  const appendHistory = (text, mdPath, auto = false) => {
    if (!text || !text.trim()) return
    try {
      const hist = JSON.parse(localStorage.getItem('simppt-history') || '[]')
      const last = hist[hist.length - 1]
      if (last && last.text === text) return
      if (auto && last && Date.now() - last.t < 60000) return
      localStorage.setItem('simppt-history', JSON.stringify(
        [...hist, { t: Date.now(), mdPath, text }].slice(-20),
      ))
    } catch {
      // 空間不足就算了 — 備份是保險不是主體
    }
  }

  const saveSession = () => {
    const view = !editor.hidden ? 'editor' : (!stage.hidden ? 'play' : 'landing')
    if (view === 'play' && state.deckUrl) return
    const session = {
      view,
      text: !editor.hidden ? edText.value : state.sourceText,
      mdPath: state.mdPath,
      index: state.index,
      dirty: edDirty,
      cursor: !editor.hidden ? edText.selectionStart : 0,
      scroll: !editor.hidden ? edText.scrollTop : 0,
    }
    try {
      localStorage.setItem('simppt-session', JSON.stringify(session))
    } catch {
      // localStorage 滿了或被擋 — 略過
    }
    if (view === 'editor') appendHistory(session.text, session.mdPath, true)
    idbSet('fileHandle', state.fileHandle || null).catch(() => {})
    idbSet('dirHandle', state.dirHandle || null).catch(() => {})
  }

  let saveTimer = null
  const scheduleSave = () => {
    clearTimeout(saveTimer)
    saveTimer = setTimeout(saveSession, 300)
  }

  const clearSession = () => {
    localStorage.removeItem('simppt-session')
    idbSet('fileHandle', null).catch(() => {})
    idbSet('dirHandle', null).catch(() => {})
  }

  const restoreSession = async () => {
    const raw = localStorage.getItem('simppt-session')
    if (!raw) return false
    try {
      const s = JSON.parse(raw)
      if (!s.text || s.view === 'landing') return false
      state.mdPath = s.mdPath || ''
      try {
        state.fileHandle = (await idbGet('fileHandle')) || null
        state.dirHandle = (await idbGet('dirHandle')) || null
      } catch {
        // handle 讀不回來就當純文字繼續
      }
      if (state.dirHandle) {
        try {
          if (await state.dirHandle.queryPermission({ mode: 'read' }) === 'granted') {
            const fileMap = new Map()
            await walkDirHandle(state.dirHandle, '', fileMap)
            state.fileMap = fileMap
          }
        } catch {
          // 權限沒了 — 圖片等重新授權後恢復
        }
      }
      state.sourceText = s.text
      if (s.view === 'play') {
        state.index = s.index || 0
        loadDeck(s.text, state.mdPath || '未命名.md', state.fileMap)
      } else {
        enterEditor(s.text)
        if (typeof s.cursor === 'number') {
          edText.setSelectionRange(s.cursor, s.cursor)
          edText.scrollTop = s.scroll || 0
          updatePreview()
        }
        if (s.dirty) {
          edDirty = true
          setStatus('未儲存變更（重整前的內容已還原）')
        }
      }
      return true
    } catch {
      return false
    }
  }

  // --- http 模式：?deck=path 直接載入 + 存檔自動重載 ---

  const initFromQuery = async () => {
    if (!/^https?:$/.test(location.protocol)) return
    const deckParam = new URLSearchParams(location.search).get('deck')
    if (!deckParam) return
    const baseUrl = deckParam.includes('/')
      ? deckParam.slice(0, deckParam.lastIndexOf('/') + 1)
      : ''
    const load = async () => {
      try {
        const res = await fetch(deckParam, { cache: 'no-store' })
        if (!res.ok) {
          showToast(`載入失敗（${res.status}）：${deckParam}`)
          return false
        }
        const text = await res.text()
        if (text === state.sourceText) return true
        if (!editor.hidden || edDirty) return true
        appendHistory(state.sourceText, state.mdPath)
        loadDeck(text, deckParam, new Map(), baseUrl)
        state.deckUrl = deckParam
        return true
      } catch {
        return false
      }
    }
    if (await load()) {
      const savedIdx = parseInt(sessionStorage.getItem(`simppt-idx:${deckParam}`) || '', 10)
      if (Number.isFinite(savedIdx) && savedIdx > 0) goTo(savedIdx)
      stopTimer()
      state.pollTimer = setInterval(load, 1000)
    }
    return true
  }

  const boot = async () => {
    const deckParam = /^https?:$/.test(location.protocol)
      ? new URLSearchParams(location.search).get('deck')
      : null
    if (deckParam) {
      try {
        const s = JSON.parse(localStorage.getItem('simppt-session') || 'null')
        if (s && s.dirty && s.view === 'editor' && s.mdPath === deckParam && s.text) {
          await restoreSession()
          state.deckUrl = deckParam
          setStatus('已還原重整前未儲存的編輯 — Ctrl+S 會直接寫回檔案')
          return
        }
      } catch {
        // session 壞掉就走正常載入
      }
      await initFromQuery()
      return
    }
    await restoreSession()
  }
  boot()
})()
</script>
</body>
</html>
