<script id="simppt-parser">
const SimpptParser = (() => {
  'use strict'

  const KV_RE = /^([A-Za-z_][\w-]*)\s*:\s*(.+)$/
  const SEP_RE = /^\s*---(?:[ \t]+(.*?))?[ \t]*$/
  const IMG_RE = /^!\[([^\]]*)\]\(([^)]+)\)$/

  const parseDirectives = (raw) =>
    raw.split(/\s+/).filter(Boolean).reduce((acc, pair) => {
      const eq = pair.indexOf('=')
      return eq > 0 ? { ...acc, [pair.slice(0, eq)]: pair.slice(eq + 1) } : acc
    }, {})

  const parseFrontmatter = (lines) => {
    if (lines.length === 0 || lines[0].trim() !== '---') return { globals: {}, start: 0 }
    let close = -1
    for (let j = 1; j < lines.length; j += 1) {
      const t = lines[j].trim()
      if (t === '---') { close = j; break }
      if (t !== '' && !KV_RE.test(t)) break
    }
    if (close < 0) return { globals: {}, start: 0 }
    const globals = lines.slice(1, close).reduce((acc, line) => {
      const m = line.trim().match(KV_RE)
      return m ? { ...acc, [m[1]]: m[2].trim() } : acc
    }, {})
    return { globals, start: close + 1 }
  }

  const parse = (text, opts = {}) => {
    const lines = text.replace(/\r\n?/g, '\n').split('\n')
    const { globals, start } = parseFrontmatter(lines)
    const rawSlides = [{ meta: {}, sticky: false, lines: [] }]
    for (let j = start; j < lines.length; j += 1) {
      const m = lines[j].match(SEP_RE)
      if (m) {
        const raw = m[1] || ''
        rawSlides.push({
          meta: parseDirectives(raw),
          sticky: raw.split(/\s+/).includes('set'),
          lines: [],
        })
      } else {
        rawSlides[rawSlides.length - 1].lines.push(lines[j])
      }
    }
    let defaults = {}
    const slides = rawSlides
      .map((s) => {
        if (s.sticky) defaults = { ...defaults, ...s.meta }
        return {
          meta: { ...defaults, ...s.meta },
          ownMeta: s.meta,
          body: s.lines.join('\n').trim(),
        }
      })
      .filter((s) => opts.keepEmpty === true || s.body !== '' || Object.keys(s.ownMeta).length > 0)
      .map(({ meta, body }) => ({ meta, body }))
    return { globals, slides }
  }

  const slideIndexAt = (text, offset) => {
    const norm = text.replace(/\r\n?/g, '\n')
    const lines = norm.split('\n')
    const { start } = parseFrontmatter(lines)
    const cursorLine = norm.slice(0, offset).split('\n').length - 1
    let idx = 0
    for (let j = start; j <= cursorLine && j < lines.length; j += 1) {
      if (SEP_RE.test(lines[j])) idx += 1
    }
    return idx
  }

  const escapeHtml = (s) => s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')

  const inline = (s) => s
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')

  const renderMarkdown = (body, resolveSrc = (src) => src) => {
    const lines = body.replace(/\r\n?/g, '\n').split('\n')
    const blocks = []
    let list = null
    let para = []
    const flushPara = () => {
      if (para.length > 0) blocks.push(`<p>${inline(escapeHtml(para.join(' ')))}</p>`)
      para = []
    }
    const flushList = () => {
      if (list) blocks.push(`<${list.tag}>${list.items.map((i) => `<li>${i}</li>`).join('')}</${list.tag}>`)
      list = null
    }
    for (const raw of lines) {
      const line = raw.trim()
      if (line === '') { flushPara(); flushList(); continue }
      const img = line.match(IMG_RE)
      if (img) {
        flushPara(); flushList()
        blocks.push(`<figure><img src="${escapeHtml(resolveSrc(img[2]))}" alt="${escapeHtml(img[1])}"></figure>`)
        continue
      }
      const h = line.match(/^(#{1,3})\s+(.*)$/)
      if (h) {
        flushPara(); flushList()
        blocks.push(`<h${h[1].length}>${inline(escapeHtml(h[2]))}</h${h[1].length}>`)
        continue
      }
      const ul = line.match(/^[-*]\s+(.*)$/)
      if (ul) {
        flushPara()
        if (list && list.tag !== 'ul') flushList()
        list = list || { tag: 'ul', items: [] }
        list.items.push(inline(escapeHtml(ul[1])))
        continue
      }
      const ol = line.match(/^\d+\.\s+(.*)$/)
      if (ol) {
        flushPara()
        if (list && list.tag !== 'ol') flushList()
        list = list || { tag: 'ol', items: [] }
        list.items.push(inline(escapeHtml(ol[1])))
        continue
      }
      flushList()
      para.push(line)
    }
    flushPara()
    flushList()
    return blocks.join('')
  }

  return { parse, renderMarkdown, slideIndexAt }
})()
</script>

<script>
(() => {
  'use strict'

  const landing = document.getElementById('landing')
  const stage = document.getElementById('stage')
  const content = document.getElementById('slide-content')
  const indicator = document.getElementById('indicator')
  const toast = document.getElementById('toast')
  const fileInput = document.getElementById('file-input')
  const openFileBtn = document.getElementById('open-file')
  const openDirBtn = document.getElementById('open-dir')
  const openSampleBtn = document.getElementById('open-sample')
  const sampleDeck = document.getElementById('sample-deck')
  const newDeckBtn = document.getElementById('new-deck')
  const editor = document.getElementById('editor')
  const edText = document.getElementById('ed-text')
  const edPreviewBox = document.getElementById('ed-preview')
  const edViewport = document.getElementById('ed-viewport')
  const edFrame = document.getElementById('ed-frame')
  const edContent = document.getElementById('ed-content')
  const edPageInfo = document.getElementById('ed-pageinfo')
  const edStatus = document.getElementById('ed-status')
  const edPlayBtn = document.getElementById('ed-play')
  const edSaveBtn = document.getElementById('ed-save')

  const MD_RE = /\.(md|markdown)$/i
  const DEFAULT_BG = '#101014'
  const DEFAULT_COLOR = '#f5f5f5'

  const state = {
    deck: null,
    index: 0,
    mdPath: '',
    sourceText: '',
    deckBaseUrl: '',
    fileMap: new Map(),
    blobUrls: new Map(),
    fileHandle: null,
    dirHandle: null,
    lastModified: 0,
    pollTimer: null,
  }

  let toastTimer = null
  const showToast = (msg) => {
    toast.textContent = msg
    toast.hidden = false
    clearTimeout(toastTimer)
    toastTimer = setTimeout(() => { toast.hidden = true }, 3500)
  }

  const normalizePath = (base, src) => {
    const joined = `${base ? `${base}/` : ''}${src}`
    return joined.split('/').reduce((acc, part) => {
      if (part === '' || part === '.') return acc
      if (part === '..') return acc.slice(0, -1)
      return [...acc, part]
    }, []).join('/')
  }

  const findByBasename = (src) => {
    const base = src.split('/').pop()
    const key = [...state.fileMap.keys()].find((k) => k.split('/').pop() === base)
    return key ? { key, file: state.fileMap.get(key) } : null
  }

  const resolveSrc = (src) => {
    if (/^(https?:|data:|blob:)/i.test(src)) return src
    const mdDir = state.mdPath.includes('/')
      ? state.mdPath.slice(0, state.mdPath.lastIndexOf('/'))
      : ''
    const full = normalizePath(mdDir, src)
    const hit = state.fileMap.has(full)
      ? { key: full, file: state.fileMap.get(full) }
      : findByBasename(src)
    if (!hit) return state.deckBaseUrl ? state.deckBaseUrl + src : src
    if (!state.blobUrls.has(hit.key)) state.blobUrls.set(hit.key, URL.createObjectURL(hit.file))
    return state.blobUrls.get(hit.key)
  }

  const LAYOUTS = ['top', 'split']

  const applyLayout = (container, layout) => {
    container.className = `deck-slide${LAYOUTS.includes(layout) ? ` layout-${layout}` : ''}`
    if (layout !== 'split') return
    const fig = container.querySelector('figure')
    if (!fig) return
    const children = [...container.children]
    const heading = children.find((el) => /^H[1-3]$/.test(el.tagName))
    const row = document.createElement('div')
    row.className = 'split-row'
    const wrap = document.createElement('div')
    wrap.className = 'split-text'
    for (const el of children) {
      if (el !== fig && el !== heading) wrap.appendChild(el)
    }
    row.appendChild(fig)
    row.appendChild(wrap)
    container.appendChild(row)
  }

  const renderSlide = () => {
    const slide = state.deck.slides[state.index]
    const meta = { ...state.deck.globals, ...slide.meta }
    stage.style.background = meta.bg || DEFAULT_BG
    stage.style.color = meta.color || DEFAULT_COLOR
    stage.style.setProperty('--accent', meta.accent || 'inherit')
    content.innerHTML = SimpptParser.renderMarkdown(slide.body, resolveSrc)
    applyLayout(content, meta.layout)
    indicator.textContent = `${state.index + 1} / ${state.deck.slides.length}`
  }

  const revokeBlobs = () => {
    for (const url of state.blobUrls.values()) URL.revokeObjectURL(url)
    state.blobUrls = new Map()
  }

  const loadDeck = (text, mdPath, fileMap, baseUrl = '') => {
    const deck = SimpptParser.parse(text)
    if (deck.slides.length === 0) {
      showToast('這份 .md 解析不出任何頁面')
      return false
    }
    revokeBlobs()
    state.deck = deck
    state.sourceText = text
    state.mdPath = mdPath
    state.fileMap = fileMap
    state.deckBaseUrl = baseUrl
    editor.hidden = true
    state.index = Math.min(state.index, deck.slides.length - 1)
    landing.hidden = true
    stage.hidden = false
    document.title = `simppt — ${mdPath.split('/').pop()}`
    renderSlide()
    scheduleSave()
    return true
  }

  const stopTimer = () => {
    clearInterval(state.pollTimer)
    state.pollTimer = null
  }

  const stopPolling = () => {
    stopTimer()
    state.fileHandle = null
    state.dirHandle = null
  }

  const goTo = (index) => {
    if (!state.deck) return
    const clamped = Math.max(0, Math.min(index, state.deck.slides.length - 1))
    if (clamped === state.index) return
    state.index = clamped
    renderSlide()
    scheduleSave()
  }

  const pickMdPath = (fileMap) =>
    [...fileMap.keys()].filter((k) => MD_RE.test(k)).sort()[0]

  const openFromFileMap = async (fileMap) => {
    const mdPath = pickMdPath(fileMap)
    if (!mdPath) {
      showToast('找不到 .md 檔')
      return
    }
    const text = await fileMap.get(mdPath).text()
    state.index = 0
    loadDeck(text, mdPath, fileMap)
  }

  // --- 拖曳載入（webkitGetAsEntry：檔案與資料夾通吃） ---

  const walkEntry = (entry, fileMap) => new Promise((resolve) => {
    if (entry.isFile) {
      entry.file((file) => {
        fileMap.set(entry.fullPath.replace(/^\//, ''), file)
        resolve()
      }, () => resolve())
      return
    }
    const reader = entry.createReader()
    const readBatch = () => {
      reader.readEntries(async (entries) => {
        if (entries.length === 0) { resolve(); return }
        await Promise.all(entries.map((e) => walkEntry(e, fileMap)))
        readBatch()
      }, () => resolve())
    }
    readBatch()
  })

  document.addEventListener('dragover', (e) => {
    e.preventDefault()
    document.body.classList.add('dragover')
  })
  document.addEventListener('dragleave', (e) => {
    if (e.relatedTarget === null) document.body.classList.remove('dragover')
  })
  document.addEventListener('drop', async (e) => {
    e.preventDefault()
    document.body.classList.remove('dragover')
    const entries = [...e.dataTransfer.items]
      .map((item) => item.webkitGetAsEntry && item.webkitGetAsEntry())
      .filter(Boolean)
    if (entries.length === 0) return
    const fileMap = new Map()
    await Promise.all(entries.map((entry) => walkEntry(entry, fileMap)))
    stopPolling()
    await openFromFileMap(fileMap)
  })

  // --- File System Access API（可 polling 自動重載） ---

  const walkDirHandle = async (dirHandle, prefix, fileMap) => {
    for await (const entry of dirHandle.values()) {
      if (entry.kind === 'file') fileMap.set(`${prefix}${entry.name}`, await entry.getFile())
      else await walkDirHandle(entry, `${prefix}${entry.name}/`, fileMap)
    }
  }

  const reloadFromHandles = async () => {
    try {
      if (state.dirHandle) {
        const fileMap = new Map()
        await walkDirHandle(state.dirHandle, '', fileMap)
        const mdPath = pickMdPath(fileMap)
        if (!mdPath) return
        const file = fileMap.get(mdPath)
        if (file.lastModified === state.lastModified) return
        state.lastModified = file.lastModified
        loadDeck(await file.text(), mdPath, fileMap)
      } else if (state.fileHandle) {
        const file = await state.fileHandle.getFile()
        if (file.lastModified === state.lastModified) return
        state.lastModified = file.lastModified
        loadDeck(await file.text(), file.name, new Map())
      }
    } catch {
      // 檔案暫時不可讀（存檔瞬間）— 下一輪 polling 再試
    }
  }

  const startHandleWatch = () => {
    clearInterval(state.pollTimer)
    state.pollTimer = setInterval(reloadFromHandles, 1000)
  }

  openSampleBtn.addEventListener('click', () => {
    stopPolling()
    state.index = 0
    loadDeck(sampleDeck.textContent.trim(), 'sample.md', new Map())
  })

  openFileBtn.addEventListener('click', async () => {
    if (!window.showOpenFilePicker) {
      fileInput.click()
      return
    }
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md', '.markdown'] } }],
      })
      const file = await handle.getFile()
      stopPolling()
      revokeBlobs()
      state.fileHandle = handle
      state.mdPath = file.name
      state.fileMap = new Map()
      state.sourceText = await file.text()
      state.lastModified = file.lastModified
      state.index = 0
      enterEditor(state.sourceText)
    } catch {
      // 使用者取消
    }
  })

  openDirBtn.addEventListener('click', async () => {
    if (!window.showDirectoryPicker) {
      showToast('此瀏覽器不支援開啟資料夾，請改用拖曳')
      return
    }
    try {
      const handle = await window.showDirectoryPicker()
      const fileMap = new Map()
      await walkDirHandle(handle, '', fileMap)
      const mdPath = pickMdPath(fileMap)
      if (!mdPath) {
        showToast('資料夾裡找不到 .md 檔')
        return
      }
      const file = fileMap.get(mdPath)
      stopPolling()
      revokeBlobs()
      state.dirHandle = handle
      state.mdPath = mdPath
      state.fileMap = fileMap
      state.sourceText = await file.text()
      state.lastModified = file.lastModified
      state.index = 0
      enterEditor(state.sourceText)
    } catch {
      // 使用者取消
    }
  })

  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0]
    if (!file) return
    stopPolling()
    revokeBlobs()
    state.mdPath = file.name
    state.fileMap = new Map()
    state.sourceText = await file.text()
    state.index = 0
    enterEditor(state.sourceText)
    fileInput.value = ''
  })

  // --- 編輯模式：左寫右預覽 ---

  const NEW_DECK_TEMPLATE = [
    '---', 'bg: #0d0d0f', 'color: #f5f5f5', 'accent: #f4b860', '---', '',
    '# 開場大標題', '',
    '前幾張黑底白字，重點用 **粗體** 標色。', '',
    '---', '',
    '# 繼續黑底', '',
    '沒設定就繼承前面。', '',
    '--- set bg=#ffffff color=#1c1c1e accent=#d84a3f', '',
    '# 從這張起白底黑字', '',
    '分隔線寫 set = 之後都這樣。', '',
    '--- layout=top', '',
    '# 內容頁標題在上', '',
    '內文在下，**粗體關鍵字**標色。', '',
  ].join('\n')

  let edDirty = false

  const setStatus = (msg) => { edStatus.textContent = msg }

  const fitPreview = () => {
    const w = edPreviewBox.clientWidth - 32
    const h = edPreviewBox.clientHeight - 64
    const scale = Math.max(0.05, Math.min(w / window.innerWidth, h / (window.innerWidth * 0.5625)))
    edViewport.style.width = `${window.innerWidth * scale}px`
    edViewport.style.height = `${window.innerWidth * 0.5625 * scale}px`
    edFrame.style.transform = `scale(${scale})`
  }

  const updatePreview = () => {
    const text = edText.value
    const deck = SimpptParser.parse(text, { keepEmpty: true })
    const idx = Math.min(
      SimpptParser.slideIndexAt(text, edText.selectionStart),
      Math.max(0, deck.slides.length - 1),
    )
    const slide = deck.slides[idx] || { meta: {}, body: '' }
    const meta = { ...deck.globals, ...slide.meta }
    edFrame.style.background = meta.bg || DEFAULT_BG
    edFrame.style.color = meta.color || DEFAULT_COLOR
    edFrame.style.setProperty('--accent', meta.accent || 'inherit')
    edContent.innerHTML = SimpptParser.renderMarkdown(slide.body, resolveSrc)
    applyLayout(edContent, meta.layout)
    edPageInfo.textContent = deck.slides.length > 0 ? `第 ${idx + 1} / ${deck.slides.length} 頁` : ''
  }

  const enterEditor = (text) => {
    stopTimer()
    landing.hidden = true
    stage.hidden = true
    editor.hidden = false
    edText.value = text
    edDirty = false
    setStatus('Ctrl+S 儲存 · Ctrl+Enter 播放 · 播放中按 E 回編輯')
    fitPreview()
    updatePreview()
    edText.focus()
    scheduleSave()
  }

  const playFromEditor = () => {
    const text = edText.value
    const deck = SimpptParser.parse(text)
    if (deck.slides.length === 0) {
      showToast('目前內容解析不出任何頁面')
      return
    }
    state.index = Math.min(
      SimpptParser.slideIndexAt(text, edText.selectionStart),
      deck.slides.length - 1,
    )
    loadDeck(text, state.mdPath || '未命名.md', state.fileMap)
    if (state.fileHandle || state.dirHandle) startHandleWatch()
  }

  const writeTo = async (handle, text) => {
    const writable = await handle.createWritable()
    await writable.write(text)
    await writable.close()
  }

  const ensureRW = async (handle) => {
    if (await handle.queryPermission({ mode: 'readwrite' }) === 'granted') return true
    return await handle.requestPermission({ mode: 'readwrite' }) === 'granted'
  }

  const handleForPath = async (dirHandle, path) => {
    const parts = path.split('/')
    const dir = await parts.slice(0, -1).reduce(
      async (acc, name) => (await acc).getDirectoryHandle(name),
      Promise.resolve(dirHandle),
    )
    return dir.getFileHandle(parts[parts.length - 1], { create: true })
  }

  const downloadMd = (text) => {
    const a = document.createElement('a')
    const url = URL.createObjectURL(new Blob([text], { type: 'text/markdown' }))
    a.href = url
    a.download = (state.mdPath || '簡報.md').split('/').pop()
    a.click()
    setTimeout(() => URL.revokeObjectURL(url), 5000)
  }

  const saveDeck = async () => {
    const text = edText.value
    try {
      if (state.fileHandle && await ensureRW(state.fileHandle)) {
        await writeTo(state.fileHandle, text)
      } else if (state.dirHandle && state.mdPath && await ensureRW(state.dirHandle)) {
        await writeTo(await handleForPath(state.dirHandle, state.mdPath), text)
      } else if (window.showSaveFilePicker) {
        const handle = await window.showSaveFilePicker({
          suggestedName: (state.mdPath || '簡報.md').split('/').pop(),
          types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md'] } }],
        })
        state.fileHandle = handle
        state.mdPath = handle.name
        await writeTo(handle, text)
      } else {
        downloadMd(text)
      }
      state.sourceText = text
      edDirty = false
      setStatus(`已儲存 ✓ ${new Date().toLocaleTimeString()}`)
      scheduleSave()
    } catch (err) {
      if (err && err.name === 'AbortError') return
      showToast('儲存失敗，改用下載')
      downloadMd(text)
    }
  }

  newDeckBtn.addEventListener('click', () => {
    stopPolling()
    state.mdPath = ''
    state.fileMap = new Map()
    state.sourceText = ''
    enterEditor(NEW_DECK_TEMPLATE)
  })
  edPlayBtn.addEventListener('click', playFromEditor)
  edSaveBtn.addEventListener('click', saveDeck)

  document.getElementById('ed-home').addEventListener('click', () => {
    if (edDirty && !window.confirm('有未儲存的變更，確定回首頁？')) return
    stopPolling()
    clearSession()
    editor.hidden = true
    stage.hidden = true
    landing.hidden = false
    document.title = 'simppt'
  })

  edText.addEventListener('input', () => {
    edDirty = true
    setStatus('未儲存變更')
    updatePreview()
    scheduleSave()
  })
  edText.addEventListener('keyup', updatePreview)
  edText.addEventListener('click', updatePreview)

  window.addEventListener('resize', () => {
    if (!editor.hidden) fitPreview()
    if (!editor.hidden) updatePreview()
  })

  window.addEventListener('beforeunload', () => saveSession())

  document.addEventListener('keydown', (e) => {
    if (editor.hidden) return
    if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
      e.preventDefault()
      saveDeck()
    } else if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault()
      playFromEditor()
    }
  })

  // --- 導覽 ---

  const toggleFullscreen = () => {
    if (document.fullscreenElement) document.exitFullscreen()
    else document.documentElement.requestFullscreen()
  }

  const exitPlay = () => {
    enterEditor(state.sourceText)
  }

  document.addEventListener('keydown', (e) => {
    if (!editor.hidden || !state.deck || stage.hidden) return
    const key = e.key
    if (key === 'e' || key === 'E') {
      enterEditor(state.sourceText)
      return
    }
    if (key === 'Escape') {
      if (!document.fullscreenElement) exitPlay()
      return
    }
    if (key === 'ArrowRight' || key === 'ArrowDown' || key === ' ' || key === 'PageDown') {
      e.preventDefault()
      goTo(state.index + 1)
    } else if (key === 'ArrowLeft' || key === 'ArrowUp' || key === 'PageUp') {
      e.preventDefault()
      goTo(state.index - 1)
    } else if (key === 'Home') {
      goTo(0)
    } else if (key === 'End') {
      goTo(state.deck.slides.length - 1)
    } else if (key === 'f' || key === 'F') {
      toggleFullscreen()
    } else if (key === 'p' || key === 'P') {
      indicator.hidden = !indicator.hidden
    }
  })

  stage.addEventListener('click', (e) => {
    if (e.target.closest('a')) return
    if (e.target.closest('#exit-play')) return
    if (e.clientX < window.innerWidth / 4) goTo(state.index - 1)
    else goTo(state.index + 1)
  })

  document.getElementById('exit-play').addEventListener('click', exitPlay)

  // --- 會話保存：重整後留在原地 ---

  const idbOpen = () => new Promise((resolve, reject) => {
    const req = indexedDB.open('simppt', 1)
    req.onupgradeneeded = () => req.result.createObjectStore('kv')
    req.onsuccess = () => resolve(req.result)
    req.onerror = () => reject(req.error)
  })

  const idbSet = async (key, val) => {
    const db = await idbOpen()
    return new Promise((resolve, reject) => {
      const tx = db.transaction('kv', 'readwrite')
      tx.objectStore('kv').put(val, key)
      tx.oncomplete = resolve
      tx.onerror = () => reject(tx.error)
    })
  }

  const idbGet = async (key) => {
    const db = await idbOpen()
    return new Promise((resolve, reject) => {
      const req = db.transaction('kv', 'readonly').objectStore('kv').get(key)
      req.onsuccess = () => resolve(req.result)
      req.onerror = () => reject(req.error)
    })
  }

  const saveSession = () => {
    const session = {
      view: !editor.hidden ? 'editor' : (!stage.hidden ? 'play' : 'landing'),
      text: !editor.hidden ? edText.value : state.sourceText,
      mdPath: state.mdPath,
      index: state.index,
      dirty: edDirty,
    }
    try {
      localStorage.setItem('simppt-session', JSON.stringify(session))
    } catch {
      // localStorage 滿了或被擋 — 略過
    }
    idbSet('fileHandle', state.fileHandle || null).catch(() => {})
    idbSet('dirHandle', state.dirHandle || null).catch(() => {})
  }

  let saveTimer = null
  const scheduleSave = () => {
    clearTimeout(saveTimer)
    saveTimer = setTimeout(saveSession, 300)
  }

  const clearSession = () => {
    localStorage.removeItem('simppt-session')
    idbSet('fileHandle', null).catch(() => {})
    idbSet('dirHandle', null).catch(() => {})
  }

  const restoreSession = async () => {
    const raw = localStorage.getItem('simppt-session')
    if (!raw) return false
    try {
      const s = JSON.parse(raw)
      if (!s.text || s.view === 'landing') return false
      state.mdPath = s.mdPath || ''
      try {
        state.fileHandle = (await idbGet('fileHandle')) || null
        state.dirHandle = (await idbGet('dirHandle')) || null
      } catch {
        // handle 讀不回來就當純文字繼續
      }
      if (state.dirHandle) {
        try {
          if (await state.dirHandle.queryPermission({ mode: 'read' }) === 'granted') {
            const fileMap = new Map()
            await walkDirHandle(state.dirHandle, '', fileMap)
            state.fileMap = fileMap
          }
        } catch {
          // 權限沒了 — 圖片等重新授權後恢復
        }
      }
      state.sourceText = s.text
      if (s.view === 'play') {
        state.index = s.index || 0
        loadDeck(s.text, state.mdPath || '未命名.md', state.fileMap)
      } else {
        enterEditor(s.text)
        if (s.dirty) {
          edDirty = true
          setStatus('未儲存變更（重整前的內容已還原）')
        }
      }
      return true
    } catch {
      return false
    }
  }

  // --- http 模式：?deck=path 直接載入 + 存檔自動重載 ---

  const initFromQuery = async () => {
    if (!/^https?:$/.test(location.protocol)) return
    const deckParam = new URLSearchParams(location.search).get('deck')
    if (!deckParam) return
    const baseUrl = deckParam.includes('/')
      ? deckParam.slice(0, deckParam.lastIndexOf('/') + 1)
      : ''
    const load = async () => {
      try {
        const res = await fetch(deckParam, { cache: 'no-store' })
        if (!res.ok) {
          showToast(`載入失敗（${res.status}）：${deckParam}`)
          return false
        }
        const text = await res.text()
        if (text === state.sourceText) return true
        if (!editor.hidden) return true
        loadDeck(text, deckParam, new Map(), baseUrl)
        return true
      } catch {
        return false
      }
    }
    if (await load()) {
      stopPolling()
      state.pollTimer = setInterval(load, 1000)
    }
    return true
  }

  const boot = async () => {
    const hasDeckParam = /^https?:$/.test(location.protocol)
      && new URLSearchParams(location.search).get('deck')
    if (hasDeckParam) {
      await initFromQuery()
      return
    }
    await restoreSession()
  }
  boot()
})()
</script>
</body>
</html>
